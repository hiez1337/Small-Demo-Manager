name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r small_demo_manager/requirements.txt
          pip install pyinstaller pillow

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name "SmallDemoManager" --distpath dist `
            --add-data "small_demo_manager/locales;locales" `
            --add-data "small_demo_manager/resources;resources" `
            --hidden-import PyQt6.QtCore `
            --hidden-import PyQt6.QtGui `
            --hidden-import PyQt6.QtWidgets `
            --hidden-import qt_material `
            --hidden-import demoparser2 `
            --hidden-import opuslib `
            --hidden-import opuslib.api `
            --hidden-import opuslib.api.decoder `
            --hidden-import pygame `
            --hidden-import pyperclip `
            --collect-data qt_material `
            --icon small_demo_manager/resources/homeNew.png `
            small_demo_manager/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmallDemoManager-windows
          path: dist/SmallDemoManager.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/SmallDemoManager.exe
          fail_on_unmatched_files: false
          body: |
            ## What's new in ${{ github.ref_name }}

            **🇬🇧 English**
            - **Timeline tab** — chronological killfeed for all rounds. Filter by round to see who killed who, with what weapon, headshots
            - **Match duration** — now displays correctly (MM:SS) in the Spectator tab
            - **i18n improvements** — all UI texts rewritten for clarity, new translations for Timeline tab
            - **Accessibility** — fixed color contrast for WCAG AA compliance (accent buttons, borders, secondary text)
            - **Player sorting** — match stats are now sorted by in-game score (same order as TAB in CS2)
            - **Fixed leetify.com URL** — now opens the correct profile page
            - **UI polish** — tab fade animation, design tokens system, consistent spacing and borders
            - **Bilingual README** — full English and Russian documentation with collapsible sections

            **🇷🇺 Русский**
            - **Вкладка Timeline** — лента убийств по раундам. Фильтр по раунду, оружие, хедшоты
            - **Длительность матча** — теперь отображается корректно (ММ:СС)
            - **Улучшен перевод** — все тексты интерфейса переписаны, добавлены переводы для Timeline
            - **Доступность** — исправлен контраст цветов для WCAG AA
            - **Сортировка игроков** — статистика сортируется по очкам как в игре
            - **Исправлен URL leetify.com** — открывается правильная страница профиля
            - **Полировка UI** — анимация переключения вкладок, система дизайн-токенов
            - **Двуязычный README** — английская и русская документация
